<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="../css/questionario.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questionário</title>
    <link rel="icon" href="./assets/icon/holofocus-06 1.png" />
</head>

<body>
    <div class="body">
        <svg class="svg" viewBox="0 0 300 150" preserveAspectRatio="none">
            <path></path>
        </svg>
        <svg class="svg" viewBox="0 0 300 150" preserveAspectRatio="none">
            <path></path>
        </svg>
    </div>
    <div id="divContainer1" class="container">
        <div class="topo">
            <h1>Questionário Perfil Sonoro</h1>
            <button onclick="resultado()">Pular</button>
        </div>

        <div class="perguntasCards">
            <form class="cards" id="formPerfil">
            </form>
        </div>
    </div>
    <div id="divContainer2" class="container">
        <div class="topo">
            <button onclick="voltar()">Voltar</button>
            <h2>Seu Perfil Sonoro</h2>
        </div>
        <h1 id="seuPerfil">Perfil</h1>
        <div class="perguntasCards">
            <form class="cards" id="resultPerfil">
                <div class="card proximo">
                    <h3>Emoção</h3>
                    <div class="respostas">
                        <div>
                            <label for="e1_a">Positivo</label>
                            <input type="radio" name="eixo1" id="e1_a" value="P">
                        </div>
                        <div>
                            <label for="e1_b">Introspectivo</label>
                            <input type="radio" name="eixo1" id="e1_b" value="I">
                        </div>
                    </div>
                </div>
                <div class="card proximo">
                    <h3>Intensidade</h3>
                    <div class="respostas">
                        <div>
                            <label for="e2_a">Enérgico</label>
                            <input type="radio" name="eixo2" id="e2_a" value="E">
                        </div>
                        <div>
                            <label for="e2_b">Suave</label>
                            <input type="radio" name="eixo2" id="e2_b" value="S">
                        </div>
                    </div>
                </div>
                <div class="card proximo">
                    <h3>Movimento</h3>
                    <div class="respostas">
                        <div>
                            <label for="e3_a">Dançante</label>
                            <input type="radio" name="eix3" id="e3_a" value="D">
                        </div>
                        <div>
                            <label for="e3_b">Contemplativo</label>
                            <input type="radio" name="eix3" id="e3_b" value="C">
                        </div>
                    </div>
                </div>
                <div class="card proximo">
                    <h3>Engajamento</h3>
                    <div class="respostas">
                        <div>
                            <label for="e4_a">Ativo</label>
                            <input type="radio" name="eixo4" id="e4_a" value="A">
                        </div>
                        <div>
                            <label for="e4_b">Passivo</label>
                            <input type="radio" name="eixo4" id="e4_b" value="C">
                        </div>
                    </div>
                </div>
                <div class="linhaBotao">
                    <button type="submit">Salvar Perfil</button>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
<script src="../js/questionario.js"></script>
