<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>

    <link rel="stylesheet" href="./css/elementosPadrao.css" />
    <link rel="stylesheet" href="./css/cadastro.css" />
    <link rel="icon" href="./assets/icon/holofocus-06 1.png" />
</head>
<header id="header">
    <div class="logoHeader"><a href="./index.html"><img src="./assets/icon/holofocus-06 1.png" alt="logo HoloFocus"></a>
    </div>
    <ul>
        <li class="navLink"><a href="./a-plataforma.html">A PLATAFORMA</a></li>
        <li class="navLink"><a href="./sobre-nos.html">SOBRE NÓS</a></li>
        <li class="navLink"><a href="./contate-nos.html">CONTATE-NOS</a></li>

        <li class="botaoHeader"><a href="./login.html">LOGIN</a></li>
        <li class="botaoHeader cadastrar"><a href="./cadastro.html">CADASTRE-SE</a></li>
    </ul>
    <label class="hamburger">
        <input type="checkbox" id="menuHamburguer">
        <svg viewBox="0 0 32 32">
            <path class="line line-top-bottom"
                d="M27 10 13 10C10.8 10 9 8.2 9 6 9 3.5 10.8 2 13 2 15.2 2 17 3.8 17 6L17 26C17 28.2 18.8 30 21 30 23.2 30 25 28.2 25 26 25 23.8 23.2 22 21 22L7 22">
            </path>
            <path class="line" d="M7 16 27 16"></path>
        </svg>
    </label>
</header>

<body>
    <div id="divFundo" class="fundo">
        <div class="container">
            <div id="divParte1">
                <span class="tituloParte1">Que bom ter você conosco!</span>
                <div class="inputs">
                    <div class="grupoInput">
                        <span id="spnRazao">Razão Social</span>
                        <input placeholder="Razão social da sua empresa" type="text" id="inptRazaoSocial">
                    </div>
                    <div class="linha">
                        <div class="grupoInput cnpj">
                            <span id="spnCnpj">CNPJ</span>
                            <input placeholder="XX.XXX.XXX/0001-YY" type="text" id="inptCNPJ" maxlength="18">
                        </div>
                        <div class="grupoInput cep">
                            <span id="spnCep">CEP</span>
                            <input placeholder="00000-000" type="text" id="inptCEP" maxlength="9">
                        </div>
                    </div>
                    <div class="grupoInput">
                        <span id="spnEndereco">Endereço</span>
                        <input placeholder="Digite seu endereço" type="text" id="inptEndereco">
                    </div>
                    <div class="linha">
                        <div class="grupoInput numero">
                            <span id="spnNumero">Número</span>
                            <input placeholder="12345" type="number" id="inptNumero">
                        </div>
                        <div class="grupoInput complemento">
                            <span>Complemento (opcional)</span>
                            <input placeholder="Complemento se houver" type="text" id="inptComplemento">
                        </div>
                    </div>
                </div>
                <div class="conjuntoBotao">
                    <button onclick="proximo()" class="botao formulario">PRÓXIMO</button>
                    <a href="./login.html">Já tem cadastro? Clique aqui</a>
                </div>
            </div>
            <div id="divParte2">
                <span>
                    <button onclick="voltar()">Voltar</button>
                    Falta pouco!
                </span>
                <div class="inputs">
                    <div class="grupoInput">
                        <span id="spnNome">Nome para contato</span>
                        <input placeholder="Digite seu nome" type="text" id="inptNome">
                    </div>
                    <div class="linha">
                        <div class="grupoInput email">
                            <span id="spnEmail">E-mail</span>
                            <input placeholder="meu.email@email.com" type="text" id="inptEmail">
                        </div>
                        <div class="grupoInput celular">
                            <span id="spnCelular">Celular</span>
                            <input placeholder="(99) 99999-9999" type="text" maxlength="15" id="inptCelular">
                        </div>
                    </div>
                    <div class="grupoInput">
                        <span id="spnSenha">Senha</span>
                        <input placeholder="Digite sua senha" type="text" id="inptSenha">
                    </div>
                    <div class="grupoInput">
                        <span id="spnConfirma">Confirme a senha</span>
                        <input placeholder="Confirmar a senha" type="text" id="inptConfirmaSenha">
                    </div>
                </div>
                <div class="conjuntoBotao">
                    <button onclick="cadastrar()" class="botao formulario">Cadastrar</button>
                </div>
            </div>
        </div>
    </div>
    <div id="divFundoErro" class="fundoErro">
        <div class="containerErro">
            <h1 id="titulo">Erro</h1>
            <span id="spnErro"></span>
        </div>
    </div>
</body>

<script src="./js/elementosPadrao.js"></script>
<script src="./js/cadastro.js"></script>

</html>
