<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Editar Perfil</title>
    <link rel="icon" href="./assets/icon/holofocus-06 1.png" />
    <link rel="stylesheet" href="css/editarPerfil.css">
    <script src="./js/elementosPadrao.js"></script>
</head>
<body onload="validarSessao()">
<button onclick="voltar()" class="botao-voltar">↩</button>

   <svg class="svg">
      <path class="path"></path>
   </svg>
   <svg>
      <path></path>
   </svg>


<div class="container">
   
    <div class="card">
        <div class="topo">
            <h2><strong>Editar perfil </strong></h2>
            <button onclick="voltar()" class="btx"><img src="assets/imgs/IconX.png" alt=""></button>
        </div>

        <form>
            <label>Nome</label>
            <input type="text">

            <div class="linha">
                <div class="campo">
                    <label>E-mail</label>
                    <input type="email">
                </div>

                <div class="campo">
                    <label>Celular</label>
                    <input type="text" placeholder="(99) 99999-9999">
                </div>
            </div>

            <label>Senha</label>
            <input type="password">

            <label>Confirma senha</label>
            <input type="password">

            <label>Nível de permissão</label>
            <select>
                <option>selecionar</option>
            </select>

            <button type="submit">SALVAR</button>
        </form>
    </div>
</div>

</body>
<script>
    
    const voltar = () => {
        const nivelAcesso = sessionStorage.NIVEL_ACESSO;

        if(nivelAcesso == null || nivelAcesso == ""){
            sessionStorage.clear()
            window.location.href = "/";
        }else if( nivelAcesso == 1){
            window.location.href = "/dashmarketing.html"
        }else if( nivelAcesso == 2){
           window.location.href = "/dashboard.html"
        }
    }
</script>
</html>
