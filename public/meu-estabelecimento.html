<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Estabelecimento - HoloFocus</title>
    <link rel="icon" href="./assets/icon/holofocus-06 1.png" />

    <link rel="stylesheet" href="./css/meu-estabelecimento.css" />
    <link rel="stylesheet" href="./css/output.css" />
  </head>
  <body style="background-color: #2a2a2a">
    <header id="__header">
      <img
        id="logo__header"
        src="./assets/icon/holofocus-06 1.png"
        alt="logo holofocus"
        class="w-30 self-start ml-36"
      />
      <ul class="flex flex-col items-start gap-6">
        <li></li>
        <li>
          <a href=""
            ><img
              src="./assets/icon/icon-dashboard.png"
              alt="Icône dashboard"
            />
            <p>Dashboard</p></a
          >
        </li>
        <li>
          <a href=""
            ><img src="./assets/icon/icon-usuarios.png" alt="Icône usuários" />
            <p>Usuários</p></a
          >
        </li>
        <li>
          <a href=""
            ><img src="./assets/icon/icon-gerencia.png" alt="Icône gerência" />
            <p>Gerência</p></a
          >
        </li>
        <li>
          <a href=""
            ><img src="./assets/icon/icon-suporte.png" alt="Icône suporte" />
            <p>Suporte</p></a
          >
        </li>
        <li>
          <a href=""
            ><img
              src="./assets/icon/icon-favoritos.png"
              alt="Icône favoritos"
            />
            <p>Favoritos</p></a
          >
        </li>
      </ul>
      <div class="flex flex-col self-center w-2/3">
        <p class="text-white self-start">Gustavo Xavier</p>
        <a id="btt___configuracoes" href="" class="self-start"
          ><img
            class="w-6"
            src="./assets/icon/icon-configuracoes.svg"
            alt="Icone de configurações"
          />
          <p>Configurações</p></a
        >
        <a id="btt__sair" href=""
          ><img src="./assets/icon/icon-sair.png" alt="Icone de sair" class="h-[18px]"/><span>Sair</span></a
        >
      </div>
    </header>
    <main class="bg-black rouded-16 w-1/1 h-1/1 ml-16">
      <div class="flex items-start w-1/1 gap-[20px]">
        <section id="section__1" class="w-3/12 flex flex-col gap-8 font-black">
          <div
            id="perfil__principal"
            class="bg-[#F0D48D] flex flex-col items-center justify-around rounded-[16px] h-[8rem]"
          >
            <span id="span__perfil_principal" class="text-3xl">Dançante</span>
            <label class="text-sm">Perfil principal</label>
          </div>
          <div
            class="bg-[#F0D48D] flex flex-col items-center justify-around rounded-[16px] h-[8rem]"
          >
            <span id="span__tipo_estabelecimento" class="text-3xl font-black"
              >Casa de show</span
            >
            <label class="text-sm"> Tipo estabelecimento</label>
          </div>
          <div
            class="bg-[#F0D48D] flex flex-col items-center justify-around rounded-[16px] h-[8rem]"
          >
            <span id="span__eventos-realizados" class="text-6xl font-black"
              >10</span
            >
            <label class="text-sm">Eventos realizados</label>
          </div>
        </section>
        <section
          id="section__2"
          class="w-2/5 flex flex-col gap-16 font-black bg-[#F0D48D] rounded-[16px] items-center"
        >
          <h2>Preferência de resultados</h2>
          <div class="flex flex-col w-4/5">
            <label for="perfil__sonoro">Perfil Sonoro</label>
            <select
              name="perfil__sonoro"
              id="select__perfil-sonoro"
              class="font-normal"
            >
              <option value="#" selected disabled class="">
                Selecione o perfil
              </option>
            </select>
            <hr class="w-1/1" />
          </div>
          <div class="flex flex-col w-4/5">
            <label for="local">Local</label>
            <select name="local" id="select__local" class="font-normal">
              <option value="#" selected disabled class="">
                Selecione o local
              </option>
            </select>
            <hr class="w-1/1" />
          </div>
          <div class="flex flex-col w-4/5">
            <label for="genero">Genêro</label>
            <select name="genero" id="select__genero" class="font-normal">
              <option value="#" selected disabled class="">
                Selecione o genêro
              </option>
            </select>
            <hr class="w-1/1" />
          </div>
          <div class="flex flex-col w-4/5">
            <label for="indece_popularidade">Índice de popularidade</label>
            <select
              name="indece_popularidade"
              id="select__indice_popularidade"
              class="font-normal"
            >
              <option value="#" selected disabled class="">
                Selecione o índice de popularidade
              </option>
            </select>
            <hr class="w-1/1" />
          </div>
        </section>
        <section
          id="section__3"
          class="w-2/5 flex flex-col gap-16 font-black bg-[#F0D48D] rounded-[16px] items-center"
        >
          <h2>Perfis Sonoros</h2>
          <div id="div__lista_perfis" class="flex flex-col w-5/6 gap-12">
            <div class="flex flex-col gap-1.5">
              <div class="flex justify-between">
                <h3 class="font-light">Dançante</h3>
                <button class="button__editar bg-black text-white font-light">
                  Editar
                </button>
              </div>
              <hr class="w-1/1" />
            </div>
            <div class="flex flex-col gap-1.5">
              <div class="flex justify-between">
                <h3 class="font-light">Dançante</h3>
                <button class="button__editar bg-black text-white font-light">
                  Editar
                </button>
              </div>
              <hr class="w-1/1" />
            </div>
            <div class="flex flex-col gap-1.5">
              <div class="flex justify-between">
                <h3 class="font-light">Dançante</h3>
                <button class="button__editar bg-black text-white font-light">
                  Editar
                </button>
              </div>
              <hr class="w-1/1" />
            </div>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
